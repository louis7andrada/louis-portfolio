<script>
(function () {
  /* Lock column width so opening the form never shifts the centered layout */
  requestAnimationFrame(function () {
    var col = document.querySelector('.links-col');
    if (col) col.style.width = col.getBoundingClientRect().width + 'px';
  });

  var toggleBtn = document.getElementById('toggleContact');
  var contactSection = document.getElementById('contactSection');
  if (toggleBtn && contactSection) {
    toggleBtn.onclick = function () {
      contactSection.classList.toggle('hidden');
    };
  }

  var submitBtn = document.getElementById('submitBtn');
if (submitBtn) {
  submitBtn.addEventListener('click', async function () {
    var form = document.getElementById('contactForm');
    var successMessage = document.getElementById('contactSuccessMessage');
    if (typeof grecaptcha === 'undefined') { alert('reCAPTCHA not loaded.'); return; }

    var originalLabel = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.style.opacity = "0.5";
    submitBtn.textContent = "Sending…";

    try {
      const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'submit' });
      const verifyRes = await fetch('/.netlify/functions/verifyRecaptcha', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const verifyData = await verifyRes.json();
      if (!verifyData.success || verifyData.score < 0.5) {
        alert('Your submission was flagged. Please try again.'); return;
      }
      form.querySelector('.recaptcha-token-field').value = token;

      const payload = {
        action: 'contact',
        email: form.querySelector('[name="email"]').value.trim(),
        fullName: form.querySelector('[name="name"]').value.trim(),
        phone: form.querySelector('[name="phone"]').value.trim(),
        message: form.querySelector('[name="message"]').value.trim()
      };

      const res = await fetch(window.APP_CONFIG.googleScriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      const result = String(await res.text()).trim();

      if (res.ok && result === "OK") {
        form.reset();
        successMessage.classList.remove('hidden');
      } else {
        alert('There was an error. Please try again.');
      }
    } finally {
      submitBtn.disabled = false;
      submitBtn.style.opacity = "";
      submitBtn.textContent = originalLabel;
    }
  });
}

  var params = new URLSearchParams(window.location.search);
  if (params.get('success') === 'true' && contactSection) {
    contactSection.classList.remove('hidden');
    var sm = document.getElementById('contactSuccessMessage');
    if (sm) sm.classList.remove('hidden');
  }
})();
</script>
