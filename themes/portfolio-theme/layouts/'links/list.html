  <div class="content-block flex flex-row items-start gap-10 md:gap-16 mt-14">

    <div class="links-col flex flex-col">
      <nav class="flex flex-col items-end text-right">
        <a href="https://instagram.com/louisandrada"                             target="_blank" rel="noopener noreferrer" class="tw-link">Insta<span class="ink">gram</span></a>
        <a href="https://www.louisandrada.com"                                   target="_blank" rel="noopener noreferrer" class="tw-link">Portf<span class="ink">olio</span></a>
        <a href="https://www.linkedin.com/in/luis7andrada/"                      target="_blank" rel="noopener noreferrer" class="tw-link">Link<span class="ink">edIn</span></a>
        <a href="https://instagram.com/louis7andrada"                            target="_blank" rel="noopener noreferrer" class="tw-link"><span class="ink">Pers</span>onal <span class="ink">IG</span></a>
        <a href="https://linkbio.co/IOHRGUofT"                                   target="_blank" rel="noopener noreferrer" class="tw-link">IOH<span class="ink">RG</span>-Uof<span class="ink">T</span></a>
        <a href="https://m.imdb.com/name/nm13775288/"                            target="_blank" rel="noopener noreferrer" class="tw-link">IM<span class="ink">Db</span></a>
        <a href="https://open.spotify.com/user/nyancorn?si=0e4d05bfb35146dd"     target="_blank" rel="noopener noreferrer" class="tw-link">Spot<span class="ink">ify</span></a>

    </div>

    <div class="shrink-0">
      <img src="/profile2.jpeg" alt="Louis Andrada" class="links-photo" />
    </div>

  </div>
</section>

<style>
  @media (min-width: 641px) {
    .link-page {
      min-height: calc(100vh - 60px);
    }
    .content-block {
      margin-top: auto;
      margin-bottom: auto;
    }
  }

  .name-band {
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.02em;
    color: #161616;
  }
  .dark .name-band { color: #ececec; }

  .content-block { width: fit-content; }
  .links-col     { width: fit-content; }

  .tw-link {
    -webkit-appearance: none;
    appearance: none;
    display: inline-block;
    position: relative;
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    white-space: nowrap;
    font-size: 1.35rem;
    line-height: 1.32;
    letter-spacing: 0.01em;
    color: #161616;
    text-decoration: none !important;
    transition: color 0.15s ease;
  }
  .tw-link::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 3px;
    height: 1px;
    background: currentColor;
    display: none;
  }
  .tw-link:hover {
    background: transparent !important;
    font-weight: 700;
    color: #000;
    text-decoration: none !important;
  }
  .tw-link:hover::after { display: block; }
  .dark .tw-link { color: #ececec; }
  .dark .tw-link:hover { color: #fff; }

  .tw-link .ink {
    font-weight: 800;
    color: #000;
    text-shadow: 0 0 0.5px currentColor, 0 0 0.5px currentColor;
  }
  .dark .tw-link .ink { color: #fff; }

  /* Desktop photo */
  .links-photo {
    width: clamp(200px, 24vw, 280px);
    height: clamp(280px, 52vh, 430px);
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .name-band { font-size: 0.9rem; }
    .name-band > div { font-size: 0.85rem; gap: 0.5rem; }

    .content-block {
      flex-direction: column-reverse;
      align-items: center;
      gap: 1.5rem;
      margin-top: 2rem;
      width: 100% !important;
    }
    .links-col { align-items: center; width: 100% !important; }
    .links-col nav { align-items: center; text-align: center; gap: 0.75rem; }

    .links-photo {
      margin-top: 4rem;
      margin-bottom: 3rem;
      width: min(150px, 52vw);
      height: min(150px, 52vw);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center top;
    }
  }
</style>

<script>
(function () {
  requestAnimationFrame(function () {
    var col = document.querySelector('.links-col');
    if (col) col.style.width = col.getBoundingClientRect().width + 'px';
  });
})();
</script>

{{ end }}
