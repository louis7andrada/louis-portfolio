<!DOCTYPE html>
<html lang="en">
<head>
  <!--  All Rights Reserved - Louis Andrada - 2026 -->
  <!--   Webdesign by Jinah Park & Louis Andrada   -->
  <!--     AndradaMono Font by Louis Andrada       -->
  <!--       Codes by Louis Andrada                -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ if .Title }}{{ .Title }} — Louis Andrada{{ else }}Louis Andrada{{ end }}</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MSBCR3QFML"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-MSBCR3QFML');
  </script>

  <!-- SEO -->
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}Brazilian painter based in Toronto. Portfolio of artworks, commissions, and archives.{{ end }}">
  <meta name="keywords" content="Louis Andrada, artist, painter, Toronto artist, Brazilian artist, contemporary art, fine art, paintings">

  <!-- OpenGraph -->
  <meta property="og:title" content="{{ .Title }} — Louis Andrada" />
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}Brazilian painter based in Toronto. Portfolio of artworks, commissions, and archives.{{ end }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:image" content="/images/og-default.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ .Title }} — Louis Andrada" />
  <meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}Brazilian painter based in Toronto. Portfolio of artworks, commissions, and archives.{{ end }}" />
  <meta name="twitter:image" content="/images/og-default.jpg" />

  <!-- font URL -->
  <!-- <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"> -->

  <!-- Styles -->
  <link rel="stylesheet" href="/css/output.css">

  <!-- Scripts -->
  {{ $scripts := resources.Get "ts/main.ts" | js.Build }}
  <script defer src="{{ $scripts.Permalink }}"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render={{ .Site.Params.recaptcha_site_key }}"></script>
  <script>
    const RECAPTCHA_SITE_KEY = "{{ .Site.Params.recaptcha_site_key }}";
  </script>

</head>

<body class="min-h-screen flex flex-col font-sans bg-white text-black dark:bg-[#111] dark:text-white {{ if .IsHome }}page-home{{ end }}">

  {{ if ne .Params.hideHeader true }}
  {{ partial "header.html" . }}
  {{ end }}
  
  <main class="flex-1 flex flex-col">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Logging function call (runs on every page load) -->
  <script>
    fetch("/.netlify/functions/log-ip")
      .catch(err => console.error("Log-IP function failed:", err));
  </script>

  <!-- Hidden reCAPTCHA token input for forms -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const forms = document.querySelectorAll("form");
      forms.forEach(form => {
        if (!form.querySelector(".recaptcha-token-field")) {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = "g-recaptcha-response";
          input.classList.add("recaptcha-token-field");
          form.appendChild(input);
        }
      });
    });
  </script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.location.hash === "#artworks-section") {
    const target = document.getElementById("artworks-section");
    if (target) {
      // Small delay ensures page is rendered before scrolling
      setTimeout(() => target.scrollIntoView({ behavior: "smooth" }), 150);
    }
  }
});
</script>

</body>
</html>
