<div id="contactSuccessMessage" class="hidden mb-6 text-green-600 font-medium text-center">
  Thank you — your message has been sent successfully. Louis will get back to you soon.
</div>

<form 
  id="contactForm"
  action="https://formspree.io/f/maqdkwkv"
  method="POST"
  class="grid grid-cols-1 gap-4"
>

  <!-- Honeypot for spam -->
  <input type="text" name="_gotcha" class="hidden">

  <!-- reCAPTCHA v3 token -->
  <input type="hidden" name="g-recaptcha-response" class="recaptcha-token-field">

  <input 
    type="text" 
    name="name" 
    placeholder="Your Name" 
    class="border bg-gray-100 border-gray-300 rounded p-3"
    required
  />

  <input 
    type="email" 
    name="email" 
    placeholder="Your Email" 
    class="border bg-gray-100 border-gray-300 rounded p-3"
    required
  />

  <input 
    type="tel" 
    name="phone" 
    placeholder="Your Phone Number" 
    class="border bg-gray-100 border-gray-300 rounded p-3"
    required
  />

  <textarea 
    name="message" 
    placeholder="Your message..."
    rows="5"
    class="border bg-gray-100 border-gray-300 rounded p-3"
    required
  ></textarea>

  <button 
    type="submit"
    class="px-6 py-3 bg-[#575757] text-white rounded-lg font-medium hover:bg-[#9a9a9a] transition"
  >
    Send Message
  </button>

</form>

<script>
const form = document.getElementById("contactForm");
const successMessage = document.getElementById("contactSuccessMessage");

form.addEventListener("submit", async function(event) {
  event.preventDefault();

  if (typeof grecaptcha === "undefined") {
    alert("reCAPTCHA not loaded.");
    return;
  }

  // 1. Generate reCAPTCHA v3 token
  const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: "submit" });

  // 2. Verify token via Netlify backend
  const verifyRes = await fetch("/.netlify/functions/verifyRecaptcha", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token })
  });

  const verifyData = await verifyRes.json();

  // 3. Validate score
  if (!verifyData.success || verifyData.score < 0.5) {
    alert("Your submission was flagged by our security check. Please try completing the form again later.");
    return;
  }

  // 4. Attach token to form
  form.querySelector(".recaptcha-token-field").value = token;

  // 5. Submit to Formspree
  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    form.reset();
    successMessage.classList.remove("hidden");
  } else {
    alert("There was an error. Please try again later.");
  }
});
</script>
